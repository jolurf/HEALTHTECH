services:
  backend:
    build:
      context: ./backend
    container_name: resumos-alta-backend
    restart: unless-stopped
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/PDFs:/app/PDFs
      - ./backend/backups:/app/backups
      - backend_data:/app/data
    environment:
      DB_PATH:       /app/data/avaliacoes.db
      USUARIOS_FILE: /app/data/usuarios.json
      NOTIFY_EMAIL:  ${NOTIFY_EMAIL:-joaoreisfreitas@gmail.com}
      SMTP_HOST:     ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASS:     ${SMTP_PASS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: resumos-alta-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:${APP_PORT:-8080}:80"
    environment:
      BACKEND_HOST: http://backend:8000
      RESOLVER: 127.0.0.11
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
