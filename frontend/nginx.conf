server {
    listen 80 default_server;
    server_name _;

    # BACKEND_HOST já vem com esquema (http:// ou https://) e porta se precisar,
    # ex: "https://healthtech-production-da6a.up.railway.app" (produção, domínio
    # público do Railway) ou "http://backend:8000" (docker-compose local).
    resolver ${RESOLVER} valid=30s;
    set $backend "${BACKEND_HOST}";

    # Necessário para proxy_pass com variável para um backend HTTPS:
    # garante o SNI correto no handshake TLS e o Host esperado pelo Railway.
    proxy_ssl_server_name on;
    proxy_set_header Host $proxy_host;

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /login {
        proxy_pass $backend;
    }

    location ^~ /logout {
        proxy_pass $backend;
    }

    location ^~ /cadastrar {
        proxy_pass $backend;
    }

    location ^~ /alterar-senha {
        proxy_pass $backend;
    }

    location ^~ /atualizar-email {
        proxy_pass $backend;
    }

    location ^~ /admin {
        proxy_pass $backend;
    }

    location ^~ /resumos {
        proxy_pass $backend;
    }

    location ^~ /avaliar {
        proxy_pass $backend;
    }

    location ^~ /avaliacoes {
        proxy_pass $backend;
    }

    location ^~ /pdfs {
        proxy_pass $backend;
    }

    location ^~ /pdf {
        proxy_pass $backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
