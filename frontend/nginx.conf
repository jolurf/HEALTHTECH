server {
    listen 80 default_server;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "http://healthtech.railway.internal:8000";

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /login {
        proxy_pass $backend;
    }

    location ^~ /logout {
        proxy_pass $backend;
    }

    location ^~ /cadastrar {
        proxy_pass $backend;
    }

    location ^~ /alterar-senha {
        proxy_pass $backend;
    }

    location ^~ /atualizar-email {
        proxy_pass $backend;
    }

    location ^~ /admin {
        proxy_pass $backend;
    }

    location ^~ /resumos {
        proxy_pass $backend;
    }

    location ^~ /avaliar {
        proxy_pass $backend;
    }

    location ^~ /avaliacoes {
        proxy_pass $backend;
    }

    location ^~ /pdfs {
        proxy_pass $backend;
    }

    location ^~ /pdf {
        proxy_pass $backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
